sonar.projectKey=linguoup
sonar.organization=linguoup-org

# Source directories
sonar.sources=apps/api/src,apps/web/app,packages

# Test directories
sonar.tests=apps/api/src,apps/api/test

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.e2e-spec.ts,\
  **/migrations/**,\
  **/.agents/**,\
  **/openspec/**

# Test file patterns
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.e2e-spec.ts

# Coverage report paths
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info

# TypeScript support
sonar.typescript.tsconfigPath=apps/api/tsconfig.json
