services:
  # Init container: renders prometheus-cloud.yml template with env vars and exits
  prometheus-config-init:
    image: alpine:3.19
    volumes:
      - ./monitoring/prometheus/prometheus-cloud.yml:/tpl/prometheus.tpl.yml:ro
      - ./monitoring/prometheus:/out
    environment:
      - GRAFANA_CLOUD_PROMETHEUS_URL=${GRAFANA_CLOUD_PROMETHEUS_URL}
      - GRAFANA_CLOUD_PROMETHEUS_USER=${GRAFANA_CLOUD_PROMETHEUS_USER}
      - GRAFANA_CLOUD_PROMETHEUS_API_KEY=${GRAFANA_CLOUD_PROMETHEUS_API_KEY}
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache gettext --quiet
        envsubst < /tpl/prometheus.tpl.yml > /out/prometheus-rendered.yml
        echo "Config rendered successfully."
        cat /out/prometheus-rendered.yml

  prometheus:
    image: prom/prometheus:v2.45.0
    volumes:
      - ./monitoring/prometheus/prometheus-rendered.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      prometheus-config-init:
        condition: service_completed_successfully

  promtail:
    volumes:
      - ./apps/api/logs:/var/log/api
      - ./monitoring/promtail/promtail-cloud-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    environment:
      - GRAFANA_CLOUD_LOKI_URL=${GRAFANA_CLOUD_LOKI_URL}
      - GRAFANA_CLOUD_LOKI_USER=${GRAFANA_CLOUD_LOKI_USER}
      - GRAFANA_CLOUD_LOKI_API_KEY=${GRAFANA_CLOUD_LOKI_API_KEY}

  # Desativa as instâncias locais de Loki e Grafana já que os dados serão consumidos diretamente no Grafana Cloud
  loki:
    scale: 0

  grafana:
    scale: 0

volumes:
  prometheus_data:
    external: true
    name: linguoup_prometheus_data
