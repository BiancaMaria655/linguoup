name: CD - Production

on:
  # Manual trigger
  workflow_dispatch:

  # Automatic trigger on version tags
  push:
    tags:
      - "v*"

jobs:
  # ─── DEPLOY PRODUCTION ─────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Required reviewers configured via GitHub Environments UI
    # Go to: Settings → Environments → production → Required reviewers
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- DATABASE MIGRATIONS ---
      - name: Run Prisma migrations (Production)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: pnpm db:migrate

      # --- DEPLOY FRONTEND WEB TO VERCEL ---
      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel Project Info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      # --- DEPLOY BACKEND API TO RAILWAY ---
      - name: Deploy API to Railway
        if: ${{ env.RAILWAY_TOKEN != '' }}
        run: |
          npm i -g @railway/cli
          railway deploy --service linguoup-api
