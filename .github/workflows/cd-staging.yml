name: CD - Staging

on:
  push:
    branches:
      - main

jobs:
  # ─── BUILD DOCKER IMAGES ───────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=develop-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: linguoup-api:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: linguoup-web:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      # Conditional push to registry (placeholder until CHG-003 configures ECR)
      - name: Login to ECR
        if: ${{ env.ECR_REGISTRY != '' }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push API image to registry
        if: ${{ env.ECR_REGISTRY != '' }}
        run: |
          docker tag linguoup-api:${{ steps.tag.outputs.tag }} \
            ${{ env.ECR_REGISTRY }}/linguoup-api:${{ steps.tag.outputs.tag }}
          docker push ${{ env.ECR_REGISTRY }}/linguoup-api:${{ steps.tag.outputs.tag }}

      - name: Push Web image to registry
        if: ${{ env.ECR_REGISTRY != '' }}
        run: |
          docker tag linguoup-web:${{ steps.tag.outputs.tag }} \
            ${{ env.ECR_REGISTRY }}/linguoup-web:${{ steps.tag.outputs.tag }}
          docker push ${{ env.ECR_REGISTRY }}/linguoup-web:${{ steps.tag.outputs.tag }}

      - name: Log skipped registry push
        if: ${{ env.ECR_REGISTRY == '' }}
        run: echo "⚠️ ECR_REGISTRY secret not configured — skipping registry push (pending CHG-003)"

  # ─── DEPLOY STAGING ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    environment: staging
    steps:
      - uses: actions/checkout@v4

      # Placeholder deploy step — real deploy configured in CHG-003
      - name: Deploy to staging (placeholder)
        run: |
          echo "🚀 Deploying linguoup-api:${{ needs.build-images.outputs.image-tag }} to staging"
          echo "🚀 Deploying linguoup-web:${{ needs.build-images.outputs.image-tag }} to staging"
          echo "⚠️  Real deploy target will be configured in CHG-003 (AWS/ECS)"

  # ─── MOBILE BUILD (EAS) ────────────────────────────────────────────────────
  build-mobile-eas:
    name: Build Mobile (EAS)
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        if: ${{ env.EXPO_TOKEN != '' }}
        run: pnpm add -g eas-cli

      - name: Build mobile with EAS
        if: ${{ env.EXPO_TOKEN != '' }}
        working-directory: apps/mobile
        run: eas build --platform all --non-interactive

      - name: Log skipped EAS build
        if: ${{ env.EXPO_TOKEN == '' }}
        run: echo "⚠️ EXPO_TOKEN secret not configured — skipping EAS build"
