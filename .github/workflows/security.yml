name: Security

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write

jobs:
  # ─── SONARCLOUD SAST ───────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones disabled for better SonarCloud analysis

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        if: ${{ env.SONAR_TOKEN != '' }}
        run: pnpm --filter=api test --coverage --coverageReporters=lcov

      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Log skipped SonarCloud scan
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "⚠️ SONAR_TOKEN secret not configured — skipping SonarCloud analysis"

  # ─── TRIVY CONTAINER SCANNING ──────────────────────────────────────────────
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: linguoup-api:security-scan
          load: true
          cache-from: type=gha

      - name: Build Web image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: linguoup-web:security-scan
          load: true
          cache-from: type=gha

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: "linguoup-api:security-scan"
          format: "sarif"
          output: "trivy-api-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0" # Report only, no blocking in MVP

      - name: Scan Web image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: "linguoup-web:security-scan"
          format: "sarif"
          output: "trivy-web-results.sarif"
          severity: "HIGH,CRITICAL"
          exit-code: "0" # Report only, no blocking in MVP

      - name: Upload Trivy API scan results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-api-results
          path: trivy-api-results.sarif
          retention-days: 30

      - name: Upload Trivy Web scan results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-web-results
          path: trivy-web-results.sarif
          retention-days: 30

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-api-results.sarif"
          category: trivy-api

      - name: Upload Trivy Web results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-web-results.sarif"
          category: trivy-web
